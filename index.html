    <canvas id="starsCanvas"
        style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>

    <script>
        const starsCanvas = document.getElementById('starsCanvas');
        const sCtx = starsCanvas.getContext('2d');
        let stars = [];
        const CODE_CHARS = ['{', '}', '<', '>', '/', '=', '#', '*', ';', '(', ')', '&', '|', '=>', '//'];

        function resize() {
            starsCanvas.width = window.innerWidth;
            starsCanvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function spawnStar() {
            stars.push({
                x: Math.random() * starsCanvas.width,
                y: Math.random() * starsCanvas.height,
                size: Math.random() * 8 + 6,
                alpha: 0,
                phase: 'in',
                speed: Math.random() * 0.008 + 0.004,
                char: CODE_CHARS[Math.floor(Math.random() * CODE_CHARS.length)]
            });
        }

        for (let i = 0; i < 40; i++) {
            spawnStar();
            stars[i].alpha = Math.random();
        }

        function tick() {
            sCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
            const isLight = document.documentElement.classList.contains('light');

            for (const s of stars) {
                if (s.phase === 'in') {
                    s.alpha += s.speed;
                    if (s.alpha >= 1) { s.alpha = 1; s.phase = 'out'; }
                } else {
                    s.alpha -= s.speed;
                }
                sCtx.globalAlpha = Math.max(0, s.alpha);
                sCtx.fillStyle = isLight ? '#57606a' : '#58a6ff';
                sCtx.font = `${s.size}px monospace`;
                sCtx.fillText(s.char, s.x, s.y);
            }

            sCtx.globalAlpha = 1;
            stars = stars.filter(s => !(s.phase === 'out' && s.alpha <= 0));
            while (stars.length < 40) spawnStar();

            requestAnimationFrame(tick);
        }
        tick();
    </script>
    <script src="theme.js"></script>
    <script src="i18n.js"></script>
    <script src="globe-modal.js"></script>
    <script src="animations.js"></script>
